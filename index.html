<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OC随机脑洞器</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #fff9c4 0%, #f5c3d4 20%, #b5e8e0 60%, #fff9c4 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #8a6d3b;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5);
        }
        
        .button-container {
            display: flex;
            justify-content: center;
            margin: 20px 0 30px 0;
        }
        
        .generate-btn {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #fff176 0%, #ffeb3b 100%);
            border: none;
            border-radius: 12px;
            padding: 15px 40px;
            font-size: 1.4rem;
            font-weight: 700;
            color: #8a6d3b;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4);
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 235, 59, 0.3);
        }
        
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 193, 7, 0.6);
            background: linear-gradient(135deg, #ffee58 0%, #fdd835 100%);
        }
        
        .generate-btn:active {
            transform: translateY(1px);
        }
        
        .generator-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .card {
            background: rgba(255, 253, 231, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(255, 204, 128, 0.2);
            border: 1px solid rgba(255, 248, 170, 0.4);
        }
        
        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #8a6d3b;
            padding-bottom: 8px;
            border-bottom: 2px solid rgba(255, 235, 59, 0.3);
        }
        
        .card-content {
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            font-size: 1.2rem;
            text-align: center;
            line-height: 1.5;
            color: #6d5c3b;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 248, 170, 0.3);
        }
        
        .empty-content {
            color: #a1887f;
            font-style: normal;
        }
        
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 204, 128, 0.3);
            background: rgba(255, 253, 231, 0.8);
        }
        
        @media (min-width: 768px) {
            .container {
                padding: 30px;
            }
            
            h1 {
                font-size: 3rem;
            }
            
            .generator-container {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .card {
                flex: 1;
                min-width: 250px;
                max-width: 350px;
                transition: transform 0.3s ease, box-shadow 0.3s ease;
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease forwards;
        }
        
        @keyframes btnGlow {
            0% { box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4); }
            50% { box-shadow: 0 4px 20px rgba(255, 193, 7, 0.6); }
            100% { box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4); }
        }
        
        .btn-glow {
            animation: btnGlow 2s ease-in-out infinite;
        }
        
        .highlight {
            background: linear-gradient(120deg, rgba(255, 241, 118, 0.3) 0%, transparent 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>OC随机脑洞器</h1>
        </header>
        
        <div class="button-container">
            <button class="generate-btn" id="generate-btn">今日之洞！</button>
        </div>
        
        <div class="generator-container">
            <div class="card">
                <h2 class="card-title">脑洞背景</h2>
                <div class="card-content empty-content" id="background-box">点击上方按钮生成</div>
            </div>
            
            <div class="card">
                <h2 class="card-title">脑洞情节</h2>
                <div class="card-content empty-content" id="plot-box">点击上方按钮生成</div>
            </div>
            
            <div class="card">
                <h2 class="card-title">关键秘密</h2>
                <div class="card-content empty-content" id="secret-box">点击上方按钮生成</div>
            </div>
        </div>
    </div>

    <script>
        const backgrounds = [
            "古代", "现代", "未来", "日式奇幻", "西式奇幻", "穿书", 
            "星际航海", "蒸汽朋克", "魔法学院", "修仙世界", 
            "童话王国", "江湖武林", "宫廷权谋", "异世界转生", "时空交错", 
             "神话时代", "侦探悬疑", "怪物学院", "灵异世界",
            "学院都市", "魔法国度", "精灵森林", "兽人部落",
        ];
        
        const plots = [
            "哨向设定：首席哨兵与伪装成向导的黑暗哨兵",
            "ABO世界观：信息素无效的Omega与嗅觉过敏的Alpha",
            "真假少爷：被调换身份的真少爷以假身份回归",
            "契约婚姻：为应对家族危机达成协议，却逐渐假戏真做",
            "宿敌变情人：敌对组织高层在任务中意外结盟",
            "花吐症：唯有暗恋之人的吻才能治愈的奇异病症",
            "双重身份：白天是普通学生，夜晚是神秘组织的王牌",
            "时间循环：被困在同一天，每次循环都会发现新线索",
            "灵魂互换：意外与死对头互换身体，被迫合作寻找解决方法",
            "系统任务：绑定创作系统，必须完成指定剧情线",
            "读心术：突然能听到他人心声，发现身边人都有秘密",
            "强制匹配：基因匹配系统强制安排的伴侣，最初互不信任",
            "能力觉醒：平凡生活中突然觉醒超能力，被秘密组织招募",
            "记忆封印：重要记忆被封印，随着事件发展逐渐恢复",
            "身份伪装：为执行任务伪装成对方最讨厌的类型",
            "命运纠缠：多次在不同场合偶遇，发现彼此命运相连",
            "任务搭档：被迫组队完成危险任务，从互相嫌弃到默契配合",
            "信息素吸引：原本不合的两人发现信息素高度契合",
            "系统绑定：意外绑定反派洗白系统，必须改变原定命运",
            "精神力链接：意外建立精神力链接，能感知对方情绪和想法",
            "伪装关系：为躲避追捕伪装成情侣，却引来更多关注",
            "天赋觉醒：被认为毫无天赋，实则拥有特殊稀有天赋",
            "记忆读取：能读取接触物品的记忆，被卷入重大事件",
            "任务目标：接到的任务目标竟是熟悉之人，陷入两难",
            "梦境共享：每晚进入同一梦境，在梦中共同冒险",
            "灵魂绑定：意外与强大存在灵魂绑定，共享生命和力量",
            "时间暂停：能暂停时间，但每次使用都会消耗精神力",
            "命运改写：发现自己是书中角色，试图改写既定命运",
            "契约兽伙伴：与稀有神兽签订契约，共同成长",
            "天赋共鸣：遇到特定之人时天赋会产生共鸣反应",
        ];
        
        const secrets = [
            "实际上是穿越者，拥有前世记忆",
            "真实身份是皇室遗孤，被仇家抚养长大",
            "能够看见亡灵，但假装自己是普通人",
            "来自敌对阵营的卧底，却在任务中动摇了决心",
            "已经重生过一次",
            "并非人类，而是伪装成人的非人种族",
            "掌握着足以颠覆世界的秘密",
            "其实是神明的转世，记忆正在逐渐苏醒",
            "是某个重大实验的唯一成功体",
            "来自其他维度，在这个世界寻找回家的方法",
            "是远古强者的转世，力量正在缓慢觉醒",
            "体内流淌着神血，但自己并不知情",
            "能听懂所有生灵的语言，包括动物植物",
            "拥有预知梦的能力，但无法控制何时发生",
            "是传说中的天命之子，肩负重大使命",
            "是古代英雄的后裔，血脉中蕴含力量",
            "能与武器产生共鸣，使用任何武器都得心应手",
            "拥有真实之眼，能看破一切幻象和伪装",
            "能短暂进入他人的梦境，了解内心想法",
            "拥有空间天赋，可创造独立储物空间",
            "是预言中的人，但预言内容只有自己知道",
            "拥有看透未来的碎片影像，但时准时不准"
        ];

        const backgroundBox = document.getElementById('background-box');
        const plotBox = document.getElementById('plot-box');
        const secretBox = document.getElementById('secret-box');
        const generateBtn = document.getElementById('generate-btn');

        function getRandomItem(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        function updateCard(cardElement, content) {
            cardElement.style.opacity = '0';
            cardElement.style.transform = 'translateY(5px)';
            
            setTimeout(() => {
                cardElement.textContent = content;
                cardElement.style.opacity = '1';
                cardElement.style.transform = 'translateY(0)';
                cardElement.classList.add('fade-in');
                cardElement.classList.add('highlight');
                
                setTimeout(() => {
                    cardElement.classList.remove('fade-in');
                    setTimeout(() => {
                        cardElement.classList.remove('highlight');
                    }, 1000);
                }, 300);
            }, 100);
        }

        function generateIdea() {
            const background = getRandomItem(backgrounds);
            const plot = getRandomItem(plots);
            const secret = getRandomItem(secrets);
            
            updateCard(backgroundBox, background);
            updateCard(plotBox, plot);
            updateCard(secretBox, secret);
            
            [backgroundBox, plotBox, secretBox].forEach(box => {
                box.classList.remove('empty-content');
            });
            
            generateBtn.classList.add('btn-glow');
            setTimeout(() => {
                generateBtn.classList.remove('btn-glow');
            }, 2000);
        }

        generateBtn.addEventListener('click', generateIdea);

        document.addEventListener('keydown', (event) => {
            if (event.code === 'Space' || event.code === 'Enter') {
                generateIdea();
            }
        });
        
        generateBtn.classList.add('btn-glow');
    </script>
</body>
</html>
